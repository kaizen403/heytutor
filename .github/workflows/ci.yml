name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.32.0"
  # Next.js build reads DATABASE_URL at compile time; no live DB needed for CI build.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  validate:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @heytutor/tutor exec prisma validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Verify scripts
        run: pnpm --filter @heytutor/tutor-core verify && pnpm --filter @heytutor/tutor verify

  docker-backend:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image
        run: docker build -f deploy/azure/Dockerfile -t heytutor-api:ci .
