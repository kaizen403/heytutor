name: Deploy Backend (Azure)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/tutor/**"
      - "packages/**"
      - "deploy/azure/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to Azure VM
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_DEPLOY_HOST }}
          username: ${{ secrets.AZURE_DEPLOY_USER }}
          key: ${{ secrets.AZURE_DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            APP_DIR="/opt/heytutor"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy/azure/deploy.sh
            ./deploy/azure/deploy.sh
